<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>DocViewer</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

<!-- PDF.js -->
<script src="https://mozilla.github.io/pdf.js/build/pdf.mjs" type="module"></script>

<style>
/* ── Reset & Base ────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0f1117;
  --surface:  #161a24;
  --surface2: #1e2330;
  --border:   #2a2f3d;
  --text:     #e8eaf0;
  --muted:    #6b7280;
  --blue:     #4f8ef7;
  --blue-dim: #2a4a9a;
  --red:      #e05c5c;
  --green:    #4caf82;
  --amber:    #f5a623;
  --yellow:   #f7df1e;
  --orange:   #e44d26;
  --radius:   10px;
  --bar-h:    52px;
  --tab-h:    40px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── Layout ──────────────────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Top Bar ─────────────────────────────────────────────────────────────── */
#topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  height: var(--bar-h);
  padding: 0 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}

#logo {
  font-family: 'Courier New', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--blue);
  letter-spacing: 0.04em;
  white-space: nowrap;
}

#topbar-spacer { flex: 1; }

.icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: none;
  background: transparent;
  color: var(--muted);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
}
.icon-btn:hover, .icon-btn:active { background: var(--surface2); color: var(--text); }
.icon-btn svg { display: block; }

/* ── Type Indicator Strip ────────────────────────────────────────────────── */
#type-strip {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #fff;
}
#type-strip.pdf   { background: var(--red);    display: flex; }
#type-strip.docx  { background: var(--blue);   display: flex; }
#type-strip.xlsx  { background: var(--green);  display: flex; }
#type-strip.txt   { background: var(--muted);  display: flex; }
#type-strip.json  { background: var(--amber);  display: flex; }
#type-strip.js    { background: #b8a800;        display: flex; } /* darkened yellow for white text */
#type-strip.html  { background: var(--orange); display: flex; }

/* ── Tab Bar ─────────────────────────────────────────────────────────────── */
#tabbar {
  display: flex;
  align-items: center;
  height: var(--tab-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  scrollbar-width: none;
}
#tabbar::-webkit-scrollbar { display: none; }

.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  height: 100%;
  padding: 0 14px 0 12px;
  border-right: 1px solid var(--border);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
  max-width: 180px;
}
.tab:hover { background: var(--surface2); color: var(--text); }
.tab.active {
  color: var(--text);
  background: var(--bg);
  border-bottom: 2px solid var(--blue);
}
.tab-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tab-dot.pdf  { background: var(--red); }
.tab-dot.docx { background: var(--blue); }
.tab-dot.xlsx { background: var(--green); }
.tab-dot.txt  { background: var(--muted); }
.tab-dot.json { background: var(--amber); }
.tab-dot.js   { background: var(--yellow); }
.tab-dot.html { background: var(--orange); }
.tab-name { overflow: hidden; text-overflow: ellipsis; }
.tab-close {
  margin-left: 2px;
  opacity: 0.5;
  flex-shrink: 0;
  font-size: 14px;
  line-height: 1;
  padding: 2px;
  border-radius: 4px;
}
.tab-close:hover { opacity: 1; background: rgba(255,255,255,0.1); }

#add-tab-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 100%;
  color: var(--muted);
  cursor: pointer;
  font-size: 20px;
  flex-shrink: 0;
}
#add-tab-btn:hover { color: var(--text); }

/* ── Viewer Area ─────────────────────────────────────────────────────────── */
#viewer-area {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.doc-panel {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
}
.doc-panel.active { display: flex; }

/* ── PDF Viewer ──────────────────────────────────────────────────────────── */
#pdf-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.tb-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

#pdf-page-info {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

#pdf-search-box {
  flex: 1;
  min-width: 100px;
  max-width: 220px;
  padding: 5px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}
#pdf-search-box:focus { border-color: var(--blue); }
#pdf-search-box::placeholder { color: var(--muted); }

#pdf-zoom-select {
  padding: 4px 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  cursor: pointer;
}

#pdf-canvas-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: auto;
  background: #444;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  gap: 12px;
}

.pdf-page-canvas {
  display: block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  max-width: 100%;
}

/* ── DOCX Viewer ─────────────────────────────────────────────────────────── */
#docx-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#docx-content-wrap {
  flex: 1;
  overflow-y: auto;
  background: #fff;
  display: flex;
  justify-content: center;
}

#docx-content {
  width: 100%;
  max-width: 800px;
  padding: 40px 32px;
  color: #1a1a1a;
  font-size: 14px;
  line-height: 1.7;
  user-select: text;
}
#docx-content h1 { font-size: 22px; margin: 24px 0 12px; }
#docx-content h2 { font-size: 18px; margin: 20px 0 10px; }
#docx-content h3 { font-size: 15px; margin: 16px 0 8px; }
#docx-content p  { margin-bottom: 10px; }
#docx-content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
#docx-content td, #docx-content th {
  border: 1px solid #ccc;
  padding: 6px 10px;
  font-size: 13px;
}
#docx-content th { background: #f0f0f0; font-weight: 600; }

/* ── XLSX Viewer ─────────────────────────────────────────────────────────── */
#xlsx-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

#xlsx-sheet-tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
#xlsx-sheet-tabs::-webkit-scrollbar { display: none; }

.sheet-tab {
  padding: 4px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.12s, color 0.12s;
}
.sheet-tab.active { background: var(--green); border-color: var(--green); color: #fff; }

#xlsx-cell-ref {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--muted);
  padding: 0 8px;
  white-space: nowrap;
}

#xlsx-table-wrap {
  flex: 1;
  overflow: auto;
  background: #fff;
}

#xlsx-table {
  border-collapse: collapse;
  font-size: 12px;
  color: #1a1a1a;
  min-width: 100%;
}
#xlsx-table th {
  background: #f5f5f5;
  border: 1px solid #d0d0d0;
  padding: 4px 8px;
  font-weight: 600;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 2;
  min-width: 80px;
  text-align: center;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #555;
}
#xlsx-table .row-header {
  background: #f5f5f5;
  border: 1px solid #d0d0d0;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #888;
  text-align: center;
  position: sticky;
  left: 0;
  z-index: 1;
  white-space: nowrap;
}
#xlsx-table td {
  border: 1px solid #e0e0e0;
  padding: 3px 6px;
  white-space: nowrap;
  min-width: 80px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  outline: none;
}
#xlsx-table td:focus {
  outline: 2px solid #4caf82;
  outline-offset: -2px;
  background: #f0fff8;
}
#xlsx-table td.selected { background: #e8f4fd; }

/* ── TXT Viewer ──────────────────────────────────────────────────────────── */
#txt-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#txt-content-wrap {
  flex: 1;
  overflow: auto;
  background: var(--bg);
  display: flex;
  align-items: flex-start;
}

#txt-linenums {
  position: sticky;
  left: 0;
  flex-shrink: 0;
  background: var(--surface);
  color: var(--muted);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.75;
  padding: 28px 12px 28px 16px;
  text-align: right;
  white-space: pre;
  user-select: none;
  border-right: 1px solid var(--border);
  z-index: 1;
}

#txt-content {
  padding: 28px 20px;
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.75;
  white-space: pre;
  user-select: text;
}

/* ── Notes Panel ─────────────────────────────────────────────────────────── */
#notes-tabbar {
  display: flex;
  align-items: center;
  height: 38px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  scrollbar-width: none;
}
#notes-tabbar::-webkit-scrollbar { display: none; }

.note-tab {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 100%;
  padding: 0 10px;
  border-right: 1px solid var(--border);
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  max-width: 140px;
  transition: background 0.12s, color 0.12s;
}
.note-tab:hover { background: var(--surface); color: var(--text); }
.note-tab.active { color: var(--text); background: var(--bg); border-bottom: 2px solid #a78bfa; }

.note-tab-name {
  overflow: hidden;
  text-overflow: ellipsis;
  outline: none;
  background: transparent;
  border: none;
  color: inherit;
  font: inherit;
  cursor: pointer;
  max-width: 100px;
  padding: 0;
}
.note-tab-name:focus {
  cursor: text;
  border-bottom: 1px solid #a78bfa;
  color: var(--text);
}

.note-tab-del {
  opacity: 0;
  font-size: 14px;
  padding: 1px 3px;
  border-radius: 3px;
  flex-shrink: 0;
  transition: opacity 0.12s;
}
.note-tab:hover .note-tab-del,
.note-tab.active .note-tab-del { opacity: 0.5; }
.note-tab-del:hover { opacity: 1 !important; background: rgba(255,255,255,0.1); }

#notes-add-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 100%;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
#notes-add-btn:hover { color: var(--text); }

.notes-font-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 0 8px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  user-select: none;
  transition: color 0.12s;
}
.notes-font-btn:hover { color: var(--text); }
#notes-font-small { font-size: 11px; border-left: 1px solid var(--border); }
#notes-font-large { font-size: 15px; border-left: 1px solid var(--border); }

#notes-textarea {
  flex: 1;
  width: 100%;
  padding: 24px 20px;
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.75;
  border: none;
  outline: none;
  resize: none;
  user-select: text;
  -webkit-user-select: text;
}
#notes-textarea::placeholder { color: var(--muted); }

/* ── Empty / Drop State ──────────────────────────────────────────────────── */
#empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--muted);
}

#drop-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  transition: border-color 0.2s, background 0.2s;
  text-align: center;
}
#drop-zone.drag-over {
  border-color: var(--blue);
  background: rgba(79,142,247,0.07);
}
#drop-zone svg { color: var(--blue); opacity: 0.7; }
#drop-zone h2 { font-size: 15px; color: var(--text); font-weight: 600; }
#drop-zone p  { font-size: 13px; color: var(--muted); line-height: 1.5; }

#open-file-btn {
  padding: 10px 24px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
#open-file-btn:hover { opacity: 0.85; }

.format-pills {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.format-pill {
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
}
.format-pill.pdf  { background: rgba(224,92,92,0.15);  color: var(--red);   border: 1px solid rgba(224,92,92,0.3);  }
.format-pill.docx { background: rgba(79,142,247,0.15); color: var(--blue);  border: 1px solid rgba(79,142,247,0.3); }
.format-pill.xlsx { background: rgba(76,175,130,0.15); color: var(--green); border: 1px solid rgba(76,175,130,0.3); }
.format-pill.txt  { background: rgba(107,114,128,0.15); color: var(--muted); border: 1px solid rgba(107,114,128,0.3); }
.format-pill.json { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
.format-pill.js   { background: rgba(247,223,30,0.15); color: #b8a800;      border: 1px solid rgba(247,223,30,0.4); }
.format-pill.html { background: rgba(228,77,38,0.15);  color: var(--orange);border: 1px solid rgba(228,77,38,0.3); }

/* ── Code Viewer (JSON / JS / HTML) ─────────────────────────────────────── */
#code-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#code-lang-label {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 5px;
  color: #fff;
}
#code-lang-label.json { background: var(--amber); }
#code-lang-label.js   { background: #b8a800; }
#code-lang-label.html { background: var(--orange); }

#code-content-wrap {
  flex: 1;
  overflow: auto;
  background: #1a1d2e;
  display: flex;
  align-items: flex-start;
}

#code-linenums {
  position: sticky;
  left: 0;
  flex-shrink: 0;
  background: #1a1d2e;
  color: #4a5164;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.75;
  padding: 20px 12px 20px 16px;
  text-align: right;
  white-space: pre;
  user-select: none;
  border-right: 1px solid var(--border);
  z-index: 1;
}

#code-content-wrap pre {
  margin: 0;
  padding: 20px;
  font-size: 13px;
  line-height: 1.75;
  background: transparent !important;
}

#code-content-wrap code {
  font-family: 'Courier New', monospace;
  background: transparent !important;
  user-select: text;
  color: #e0e4f0;
}

/* ── Syntax token colors (dark theme, no CDN needed) ─────────────────────── */
#code-content-wrap .hljs-keyword,
#code-content-wrap .hljs-selector-tag   { color: #c792ea; }
#code-content-wrap .hljs-string         { color: #c3e88d; }
#code-content-wrap .hljs-number         { color: #f78c6c; }
#code-content-wrap .hljs-literal        { color: #ff5874; }
#code-content-wrap .hljs-comment        { color: #546e7a; font-style: italic; }
#code-content-wrap .hljs-attr,
#code-content-wrap .hljs-attribute      { color: #7ec8e3; }
#code-content-wrap .hljs-name,
#code-content-wrap .hljs-tag            { color: #f07178; }
#code-content-wrap .hljs-variable,
#code-content-wrap .hljs-template-variable { color: #82aaff; }
#code-content-wrap .hljs-built_in,
#code-content-wrap .hljs-builtin-name   { color: #ffcb6b; }
#code-content-wrap .hljs-function,
#code-content-wrap .hljs-title          { color: #82aaff; }
#code-content-wrap .hljs-punctuation,
#code-content-wrap .hljs-operator       { color: #89ddff; }
#code-content-wrap .hljs-meta           { color: #f07178; }

/* ── Content Search (DOCX / TXT / Code / XLSX) ──────────────────────────── */
.content-search-box {
  padding: 5px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  width: 130px;
  max-width: 40vw;
}
.content-search-box:focus { border-color: var(--blue); }
.content-search-box::placeholder { color: var(--muted); }

.search-count {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  min-width: 32px;
  text-align: center;
}

.search-nav-btn {
  width: 26px !important;
  height: 26px !important;
  font-size: 15px;
  font-weight: 700;
}

mark.search-hit {
  background: rgba(245,166,35,0.45);
  color: inherit;
  border-radius: 2px;
}
mark.search-hit.active {
  background: var(--amber);
  color: #1a1a1a;
}

#xlsx-table td.search-hit-cell { background: #fff3b0 !important; }
#xlsx-table td.search-hit-cell.active { background: #ffd54f !important; }

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  transition: transform 0.25s ease;
  z-index: 100;
  white-space: nowrap;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Update Banner ───────────────────────────────────────────────────────── */
#update-banner {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: var(--blue-dim);
  border-bottom: 1px solid var(--blue);
  font-size: 13px;
  color: var(--text);
  flex-shrink: 0;
}
#update-banner.show { display: flex; }
#update-banner button {
  padding: 4px 12px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-left: auto;
}

/* ── Loading spinner ─────────────────────────────────────────────────────── */
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Print ───────────────────────────────────────────────────────────────── */
@media print {
  #topbar, #tabbar, #pdf-toolbar, #docx-toolbar, #xlsx-toolbar,
  #update-banner, #toast { display: none !important; }
  #viewer-area, .doc-panel, #docx-content-wrap, #docx-content,
  #xlsx-table-wrap, #pdf-canvas-wrap { overflow: visible !important; }
  body { background: #fff; }
}

/* ── Scrollbars ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.json,.js,.html" style="display:none" onchange="handleFileInput(this)"/>

<!-- Toast -->
<div id="toast"></div>

<!-- CDN libs loaded dynamically to keep single-file -->
<script>
// ── CDN Loader ────────────────────────────────────────────────────────────────
const CDN = {
  mammoth:  'https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js',
  xlsx:     'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
  hf:       'https://cdn.jsdelivr.net/npm/hyperformula@2.6.1/dist/hyperformula.full.min.js',
  hljs:     'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js',
  hljsJson: 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/languages/json.min.js',
  hljsJs:   'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/languages/javascript.min.js',
  hljsHtml: 'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/languages/xml.min.js',
  hljsCss:  'https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-light.min.css',
};

function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

function loadStylesheet(href) {
  if (document.querySelector(`link[href="${href}"]`)) return Promise.resolve();
  return new Promise((res, rej) => {
    const l = document.createElement('link');
    l.rel = 'stylesheet'; l.href = href;
    l.onload = res; l.onerror = rej;
    document.head.appendChild(l);
  });
}

// ── State ─────────────────────────────────────────────────────────────────────
const tabs    = [];   // { id, name, type, data }
let activeTab = null;
let pdfDoc    = null;
let pdfScale  = 1;
let pdfRendering = false;
let xlsxWorkbook = null;
let xlsxCurrentSheet = null;
let xlsxDirty = false;
let hfInstance = null;

// ── IndexedDB ─────────────────────────────────────────────────────────────────
const DB_NAME    = 'docviewer';
const DB_VERSION = 1;
const STORE      = 'files';
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        // keyPath = id, index on 'order' so we restore in open order
        const store = d.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('order', 'order', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

function dbSave(tab) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({
      id:    tab.id,
      name:  tab.name,
      type:  tab.type,
      buf:   tab.buf,
      order: Date.now()
    });
    tx.oncomplete = res;
    tx.onerror    = e => rej(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = res;
    tx.onerror    = e => rej(e.target.error);
  });
}

function dbLoadAll() {
  return new Promise((res, rej) => {
    const tx    = db.transaction(STORE, 'readonly');
    const index = tx.objectStore(STORE).index('order');
    const req   = index.getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

// ── Boot: open DB then restore session ───────────────────────────────────────
(async () => {
  try {
    await openDB();
    const saved = await dbLoadAll();
    if (saved.length) {
      for (const file of saved) {
        tabs.push({ id: file.id, name: file.name, type: file.type, buf: file.buf });
      }
      renderTabs();
      activateTab(tabs[0].id);
    }
  } catch(e) {
    console.warn('IndexedDB restore failed:', e);
  }
})();

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          document.getElementById('update-banner').classList.add('show');
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data === 'SW_UPDATED') {
      document.getElementById('update-banner').classList.add('show');
    }
  });
}

function applyUpdate() {
  navigator.serviceWorker.ready.then(reg => {
    reg.waiting?.postMessage('SKIP_WAITING');
  });
  window.location.reload();
}

// ── File Picker ───────────────────────────────────────────────────────────────
function openFilePicker() {
  document.getElementById('file-input').value = '';
  document.getElementById('file-input').click();
}

function handleFileInput(input) {
  if (input.files[0]) handleFile(input.files[0]);
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');

document.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropZone.classList.remove('drag-over'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

// ── Handle File ───────────────────────────────────────────────────────────────
async function handleFile(file) {
  const name = file.name;
  const ext  = name.split('.').pop().toLowerCase();

  if (!['pdf','doc','docx','xls','xlsx','txt','json','js','html'].includes(ext)) {
    showToast('Unsupported file type');
    return;
  }

  const type = ext === 'pdf'                    ? 'pdf'
             : ['doc','docx'].includes(ext)     ? 'docx'
             : ['xls','xlsx'].includes(ext)     ? 'xlsx'
             : ['json','js','html'].includes(ext)? ext
             : 'txt';
  const id  = Date.now().toString();
  const buf = await file.arrayBuffer();

  tabs.push({ id, name, type, buf });
  if (db) dbSave({ id, name, type, buf }).catch(console.warn);
  renderTabs();
  activateTab(id);
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabbar');
  // Remove only document tabs, keep notes tab and add btn
  bar.querySelectorAll('.tab:not(#notes-tab)').forEach(t => t.remove());
  const addBtn = document.getElementById('add-tab-btn');

  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTab ? ' active' : '');
    el.dataset.id = tab.id;
    el.innerHTML = `
      <span class="tab-dot ${tab.type}"></span>
      <span class="tab-name">${tab.name}</span>
      <span class="tab-close" data-id="${tab.id}">×</span>
    `;
    el.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) {
        closeTab(e.target.dataset.id);
      } else {
        activateTab(tab.id);
      }
    });
    bar.insertBefore(el, addBtn);
  });
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  tabs.splice(idx, 1);
  if (db) dbDelete(id).catch(console.warn);
  if (activeTab === id) {
    activeTab = tabs[Math.min(idx, tabs.length - 1)]?.id || null;
  }
  renderTabs();
  if (activeTab) activateTab(activeTab);
  else showEmpty();
}

function showEmpty() {
  document.getElementById('empty-state').style.display = 'flex';
  ['pdf','docx','xlsx','txt','code','notes'].forEach(t => {
    document.getElementById(t + '-panel').classList.remove('active');
  });
  document.getElementById('notes-tab').classList.remove('active');
  setTypeStrip(null);
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('pdf-topbar-controls').style.display = 'none';
  resetContentSearches();
}

async function activateTab(id) {
  activeTab = id;
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;

  renderTabs();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('notes-tab').classList.remove('active');
  ['pdf','docx','xlsx','txt','code','notes'].forEach(t => {
    document.getElementById(t + '-panel').classList.remove('active');
  });
  resetContentSearches();

  const panelType = ['json','js','html'].includes(tab.type) ? 'code' : tab.type;
  document.getElementById(panelType + '-panel').classList.add('active');
  setTypeStrip(tab.type);

  document.getElementById('save-btn').style.display = tab.type === 'xlsx' ? 'flex' : 'none';
  document.getElementById('pdf-topbar-controls').style.display = tab.type === 'pdf' ? 'flex' : 'none';

  if (tab.type === 'pdf')  await loadPdf(tab);
  if (tab.type === 'docx') await loadDocx(tab);
  if (tab.type === 'xlsx') await loadXlsx(tab);
  if (tab.type === 'txt')  await loadTxt(tab);
  if (['json','js','html'].includes(tab.type)) await loadCode(tab);
}

// ── Type Strip ────────────────────────────────────────────────────────────────
function setTypeStrip(type) {
  const strip = document.getElementById('type-strip');
  strip.className = 'type-strip' + (type ? ' ' + type : '');
  strip.textContent = type ? type.toUpperCase() : '';
}

// ── Notes ─────────────────────────────────────────────────────────────────────
const NOTES_KEY = 'docviewer_notes_v2';
let notesState = null; // { activeId, notes: [{ id, name, content }] }

function loadNotesState() {
  try {
    const raw = localStorage.getItem(NOTES_KEY);
    if (raw) {
      notesState = JSON.parse(raw);
      // Ensure at least one note exists
      if (!notesState.notes || !notesState.notes.length) {
        notesState.notes = [makeNote(1)];
        notesState.activeId = notesState.notes[0].id;
      }
    } else {
      const first = makeNote(1);
      notesState = { activeId: first.id, notes: [first] };
    }
  } catch(e) {
    const first = makeNote(1);
    notesState = { activeId: first.id, notes: [first] };
  }
}

function saveNotesState() {
  localStorage.setItem(NOTES_KEY, JSON.stringify(notesState));
}

function makeNote(num) {
  return { id: Date.now().toString() + Math.random(), name: `note-${num}`, content: '' };
}

function getNextNoteNum() {
  const nums = notesState.notes
    .map(n => { const m = n.name.match(/^note-(\d+)$/); return m ? parseInt(m[1]) : 0; })
    .filter(n => n > 0);
  return nums.length ? Math.max(...nums) + 1 : notesState.notes.length + 1;
}

function renderNoteTabs() {
  const bar = document.getElementById('notes-tabbar');
  const addBtn = document.getElementById('notes-add-btn');
  // Remove existing note tabs
  bar.querySelectorAll('.note-tab').forEach(t => t.remove());

  notesState.notes.forEach(note => {
    const el = document.createElement('div');
    el.className = 'note-tab' + (note.id === notesState.activeId ? ' active' : '');
    el.dataset.id = note.id;

    // Editable name span
    const nameEl = document.createElement('span');
    nameEl.className = 'note-tab-name';
    nameEl.textContent = note.name;
    nameEl.title = 'Tap to select · hold to rename';

    // Single tap = activate, double tap = rename
    nameEl.addEventListener('click', e => {
      if (note.id !== notesState.activeId) {
        switchNote(note.id);
      }
    });
    nameEl.addEventListener('dblclick', e => {
      e.stopPropagation();
      startRename(note.id, nameEl);
    });

    // Delete btn
    const delEl = document.createElement('span');
    delEl.className = 'note-tab-del';
    delEl.textContent = '×';
    delEl.title = 'Delete note';
    delEl.addEventListener('click', e => {
      e.stopPropagation();
      deleteNote(note.id);
    });

    el.appendChild(nameEl);
    el.appendChild(delEl);
    bar.insertBefore(el, addBtn);
  });
}

function startRename(id, nameEl) {
  const note = notesState.notes.find(n => n.id === id);
  if (!note) return;
  nameEl.contentEditable = 'true';
  nameEl.focus();
  // Select all text
  const range = document.createRange();
  range.selectNodeContents(nameEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  function finish() {
    nameEl.contentEditable = 'false';
    const newName = nameEl.textContent.trim() || note.name;
    nameEl.textContent = newName;
    note.name = newName;
    saveNotesState();
  }
  nameEl.addEventListener('blur', finish, { once: true });
  nameEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
    if (e.key === 'Escape') { nameEl.textContent = note.name; nameEl.blur(); }
  });
}

function switchNote(id) {
  // Save current textarea content first
  const activeNote = notesState.notes.find(n => n.id === notesState.activeId);
  if (activeNote) {
    activeNote.content = document.getElementById('notes-textarea').value;
  }
  notesState.activeId = id;
  saveNotesState();
  renderNoteTabs();
  const note = notesState.notes.find(n => n.id === id);
  const ta = document.getElementById('notes-textarea');
  ta.value = note ? note.content : '';
  ta.focus();
}

function addNote() {
  // Save current content first
  const activeNote = notesState.notes.find(n => n.id === notesState.activeId);
  if (activeNote) activeNote.content = document.getElementById('notes-textarea').value;

  const newNote = makeNote(getNextNoteNum());
  notesState.notes.push(newNote);
  notesState.activeId = newNote.id;
  saveNotesState();
  renderNoteTabs();
  const ta = document.getElementById('notes-textarea');
  ta.value = '';
  ta.focus();
  showToast('New note created');
}

function deleteNote(id) {
  if (notesState.notes.length === 1) {
    // Last note — clear content but keep it
    notesState.notes[0].content = '';
    document.getElementById('notes-textarea').value = '';
    saveNotesState();
    showToast('Note cleared');
    return;
  }
  const idx = notesState.notes.findIndex(n => n.id === id);
  notesState.notes.splice(idx, 1);
  // If we deleted the active one, activate adjacent
  if (notesState.activeId === id) {
    notesState.activeId = notesState.notes[Math.min(idx, notesState.notes.length - 1)].id;
  }
  saveNotesState();
  renderNoteTabs();
  const note = notesState.notes.find(n => n.id === notesState.activeId);
  document.getElementById('notes-textarea').value = note ? note.content : '';
  showToast('Note deleted');
}

function activateNotes() {
  activeTab = null;
  ['pdf','docx','xlsx','txt','code','notes'].forEach(t => {
    document.getElementById(t + '-panel').classList.remove('active');
  });
  resetContentSearches();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('notes-tab').classList.add('active');
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('notes-panel').classList.add('active');
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('pdf-topbar-controls').style.display = 'none';
  setTypeStrip(null);

  // Load state and render
  if (!notesState) loadNotesState();
  renderNoteTabs();
  const note = notesState.notes.find(n => n.id === notesState.activeId);
  const ta = document.getElementById('notes-textarea');
  ta.value = note ? note.content : '';
  applyNotesFontSize();
  ta.focus();
}

// Auto-save on input
document.getElementById('notes-textarea').addEventListener('input', () => {
  if (!notesState) return;
  const note = notesState.notes.find(n => n.id === notesState.activeId);
  if (note) {
    note.content = document.getElementById('notes-textarea').value;
    saveNotesState();
  }
});

// ── Notes font size ───────────────────────────────────────────────────────────
const NOTES_FONT_KEY = 'docviewer_notes_font';
const NOTES_FONT_MIN = 11;
const NOTES_FONT_MAX = 22;

function notesAdjustFont(delta) {
  const ta = document.getElementById('notes-textarea');
  const current = parseInt(ta.style.fontSize) || parseInt(localStorage.getItem(NOTES_FONT_KEY)) || 13;
  const next = Math.min(NOTES_FONT_MAX, Math.max(NOTES_FONT_MIN, current + delta));
  ta.style.fontSize = next + 'px';
  localStorage.setItem(NOTES_FONT_KEY, next);
  showToast(`Font size: ${next}px`);
}

function applyNotesFontSize() {
  const saved = localStorage.getItem(NOTES_FONT_KEY);
  if (saved) document.getElementById('notes-textarea').style.fontSize = saved + 'px';
}

// ── PDF ───────────────────────────────────────────────────────────────────────
let pdfjsLib = null;

async function getPdfjsLib() {
  if (pdfjsLib) return pdfjsLib;
  // PDF.js via ESM dynamic import
  pdfjsLib = await import('https://mozilla.github.io/pdf.js/build/pdf.mjs');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://mozilla.github.io/pdf.js/build/pdf.worker.mjs';
  return pdfjsLib;
}

async function loadPdf(tab) {
  const wrap = document.getElementById('pdf-canvas-wrap');
  wrap.innerHTML = '<div class="spinner"></div>';
  pdfDoc = null;

  try {
    const lib = await getPdfjsLib();
    pdfDoc = await lib.getDocument({ data: tab.buf.slice(0) }).promise;
    pdfScale = calcFitScale();
    await renderAllPdfPages();
    updatePdfInfo();
  } catch(e) {
    wrap.innerHTML = `<p style="color:var(--red);padding:24px">Failed to load PDF: ${e.message}</p>`;
  }
}

function calcFitScale() {
  const wrap = document.getElementById('pdf-canvas-wrap');
  const w = wrap.clientWidth - 32;
  return Math.min(w / 612, 1.5); // 612 = standard page width pts
}

async function renderAllPdfPages() {
  if (!pdfDoc) return;
  const wrap = document.getElementById('pdf-canvas-wrap');
  wrap.innerHTML = '';

  // Scale canvas by devicePixelRatio so pixels map 1:1 to physical screen pixels.
  // Also enforce a minimum render scale so 100% / fit-width look as sharp as 125%.
  // The canvas is always drawn at high resolution; CSS scales it back down for display.
  const dpr = window.devicePixelRatio || 1;
  const MIN_RENDER_SCALE = 1.5; // never render below this regardless of zoom choice
  const renderScale = Math.max(pdfScale, MIN_RENDER_SCALE);

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const vp   = page.getViewport({ scale: renderScale * dpr });
    const canvas = document.createElement('canvas');
    canvas.className = 'pdf-page-canvas';
    // Physical pixel dimensions
    canvas.width  = vp.width;
    canvas.height = vp.height;
    // CSS dimensions use pdfScale (what the user chose) — renderScale is only for pixel quality
    canvas.style.width  = (page.getViewport({ scale: pdfScale }).width)  + 'px';
    canvas.style.height = (page.getViewport({ scale: pdfScale }).height) + 'px';
    wrap.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  }
  updatePdfInfo();
}

function updatePdfInfo() {
  if (!pdfDoc) return;
  const text = `1 – ${pdfDoc.numPages} of ${pdfDoc.numPages}`;
  document.getElementById('pdf-page-info').textContent = text;
  document.getElementById('pdf-page-info-top').textContent = `${pdfDoc.numPages} pp`;
}

function pdfCurrentPage() {
  const wrap = document.getElementById('pdf-canvas-wrap');
  const canvases = wrap.querySelectorAll('.pdf-page-canvas');
  let best = 1;
  canvases.forEach((c, i) => {
    const rect = c.getBoundingClientRect();
    if (rect.top < window.innerHeight / 2) best = i + 1;
  });
  return best;
}

function pdfPrevPage() {
  scrollToPdfPage(pdfCurrentPage() - 1);
}
function pdfNextPage() {
  scrollToPdfPage(pdfCurrentPage() + 1);
}

function scrollToPdfPage(n) {
  if (!pdfDoc) return;
  n = Math.max(1, Math.min(n, pdfDoc.numPages));
  const wrap = document.getElementById('pdf-canvas-wrap');
  const c = wrap.querySelectorAll('.pdf-page-canvas')[n - 1];
  if (c) c.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function pdfSetZoom(val) {
  if (!pdfDoc) return;
  pdfScale = val === 'fit' ? calcFitScale() : parseFloat(val);
  await renderAllPdfPages();
}

let searchHighlights = [];
async function pdfSearch(query) {
  const countEl = document.getElementById('pdf-search-count');
  if (!query || !pdfDoc) { countEl.textContent = ''; return; }

  let total = 0;
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const page = await pdfDoc.getPage(i);
    const content = await page.getTextContent();
    const text = content.items.map(it => it.str).join(' ');
    const matches = [...text.matchAll(new RegExp(query, 'gi'))];
    total += matches.length;
  }
  countEl.textContent = total ? `${total} match${total !== 1 ? 'es' : ''}` : 'No matches';
}

// ── DOCX ──────────────────────────────────────────────────────────────────────
async function loadDocx(tab) {
  const content = document.getElementById('docx-content');
  content.innerHTML = '<div class="spinner"></div>';

  try {
    await loadScript(CDN.mammoth);
    const result = await mammoth.convertToHtml({ arrayBuffer: tab.buf.slice(0) });
    content.innerHTML = result.value || '<p style="color:var(--muted)">Empty document.</p>';
  } catch(e) {
    content.innerHTML = `<p style="color:var(--red)">Failed to load document: ${e.message}</p>`;
  }
}

// ── TXT ───────────────────────────────────────────────────────────────────────
async function loadTxt(tab) {
  const content   = document.getElementById('txt-content');
  const linenums  = document.getElementById('txt-linenums');
  content.textContent  = '';
  linenums.textContent = '';
  try {
    const text = new TextDecoder('utf-8').decode(tab.buf);
    content.textContent = text || '(Empty file)';
    linenums.textContent = buildLineNumbers(text || '');
  } catch(e) {
    content.textContent = `Failed to load file: ${e.message}`;
  }
}

function buildLineNumbers(text) {
  const lineCount = (text.match(/\n/g) || []).length + 1;
  const nums = new Array(lineCount);
  for (let i = 0; i < lineCount; i++) nums[i] = i + 1;
  return nums.join('\n');
}

// ── CODE (JSON / JS / HTML) ───────────────────────────────────────────────────
let hljsReady = false;

async function loadCode(tab) {
  const content  = document.getElementById('code-content');
  const label    = document.getElementById('code-lang-label');
  content.textContent = '';

  // Set toolbar label
  label.className = `code-lang-label ${tab.type}`;
  label.textContent = tab.type.toUpperCase();

  const text = new TextDecoder('utf-8').decode(tab.buf);

  // Load highlight.js + language grammars lazily (no theme CSS — we use our own dark theme)
  if (!hljsReady) {
    await loadScript(CDN.hljs);
    await Promise.all([
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js'),
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js'),
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js'),
    ]);
    hljsReady = true;
  }

  const langMap = { json: 'json', js: 'javascript', html: 'xml' };
  content.textContent = text;
  content.className = `language-${langMap[tab.type]}`;
  content.removeAttribute('data-highlighted');
  hljs.highlightElement(content);

  document.getElementById('code-linenums').textContent = buildLineNumbers(text || '');
}

// ── XLSX ──────────────────────────────────────────────────────────────────────
async function loadXlsx(tab) {
  const tabsEl = document.getElementById('xlsx-sheet-tabs');
  tabsEl.innerHTML = '';
  document.getElementById('xlsx-table').querySelector('tbody').innerHTML = '';
  xlsxDirty = false;

  try {
    await loadScript(CDN.xlsx);
    await loadScript(CDN.hf);

    xlsxWorkbook = XLSX.read(tab.buf.slice(0), { type: 'array', cellFormula: true, cellDates: true });
    const sheetNames = xlsxWorkbook.SheetNames;

    sheetNames.forEach((name, i) => {
      const btn = document.createElement('div');
      btn.className = 'sheet-tab' + (i === 0 ? ' active' : '');
      btn.textContent = name;
      btn.onclick = () => {
        tabsEl.querySelectorAll('.sheet-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderXlsxSheet(name);
        const xlsxInput = document.getElementById('xlsx-search-box');
        if (xlsxInput) xlsxInput.value = '';
        const xlsxCount = document.getElementById('xlsx-search-count');
        if (xlsxCount) xlsxCount.textContent = '';
        searchState.xlsx = { marks: [], idx: -1 };
      };
      tabsEl.appendChild(btn);
    });

    if (sheetNames.length) renderXlsxSheet(sheetNames[0]);
  } catch(e) {
    document.getElementById('xlsx-table').querySelector('tbody').innerHTML =
      `<tr><td style="color:red;padding:16px">Failed to load: ${e.message}</td></tr>`;
  }
}

function renderXlsxSheet(sheetName) {
  xlsxCurrentSheet = sheetName;
  const ws = xlsxWorkbook.Sheets[sheetName];
  const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  const tbody = document.getElementById('xlsx-table').querySelector('tbody');
  tbody.innerHTML = '';

  if (!data.length) return;

  const cols = Math.max(...data.map(r => r.length), 1);

  // Header row (A, B, C…)
  const headTr = document.createElement('tr');
  headTr.innerHTML = '<th></th>' +
    Array.from({ length: cols }, (_, i) => `<th>${colName(i)}</th>`).join('');
  tbody.appendChild(headTr);

  data.forEach((row, ri) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="row-header">${ri + 1}</td>`;
    for (let ci = 0; ci < cols; ci++) {
      const td = document.createElement('td');
      td.contentEditable = 'true';
      td.textContent = row[ci] ?? '';
      td.dataset.row = ri;
      td.dataset.col = ci;
      td.addEventListener('focus', () => {
        document.getElementById('xlsx-cell-ref').textContent = `${colName(ci)}${ri + 1}`;
      });
      td.addEventListener('input', () => { xlsxDirty = true; });
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

function colName(i) {
  let s = '';
  i++;
  while (i > 0) {
    s = String.fromCharCode(64 + (i % 26 || 26)) + s;
    i = Math.floor((i - 1) / 26);
  }
  return s;
}

async function saveXlsx() {
  if (!xlsxWorkbook || !xlsxCurrentSheet) return;

  // Read edited cells back into workbook
  const tbody = document.getElementById('xlsx-table').querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr')).slice(1); // skip header
  const data = rows.map(tr =>
    Array.from(tr.querySelectorAll('td:not(.row-header)')).map(td => td.textContent)
  );

  const ws = XLSX.utils.aoa_to_sheet(data);
  xlsxWorkbook.Sheets[xlsxCurrentSheet] = ws;

  const buf = XLSX.write(xlsxWorkbook, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const tab  = tabs.find(t => t.id === activeTab);
  a.href     = url;
  a.download = tab?.name || 'document.xlsx';
  a.click();
  URL.revokeObjectURL(url);
  xlsxDirty = false;
  showToast('Saved');
}

// ── Content Search (DOCX / TXT / Code) ──────────────────────────────────────
const searchState = { docx: { marks: [], idx: -1 }, txt: { marks: [], idx: -1 }, code: { marks: [], idx: -1 }, xlsx: { marks: [], idx: -1 } };

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function clearHighlights(container) {
  if (!container) return;
  container.querySelectorAll('mark.search-hit').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });
}

function highlightMatches(container, query) {
  clearHighlights(container);
  if (!container || !query) return [];
  const regex = new RegExp(escapeRegex(query), 'gi');
  const marks = [];
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while (node = walker.nextNode()) textNodes.push(node);
  textNodes.forEach(tn => {
    const text = tn.nodeValue;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;
    regex.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let lastIndex = 0, m;
    while ((m = regex.exec(text))) {
      if (m.index > lastIndex) frag.appendChild(document.createTextNode(text.slice(lastIndex, m.index)));
      const mark = document.createElement('mark');
      mark.className = 'search-hit';
      mark.textContent = m[0];
      frag.appendChild(mark);
      marks.push(mark);
      lastIndex = m.index + m[0].length;
      if (m.index === regex.lastIndex) regex.lastIndex++;
    }
    if (lastIndex < text.length) frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    tn.parentNode.replaceChild(frag, tn);
  });
  return marks;
}

function runContentSearch(panelKey, containerId, countElId, query) {
  const container = document.getElementById(containerId);
  const marks = highlightMatches(container, query);
  searchState[panelKey] = { marks, idx: marks.length ? 0 : -1 };
  const countEl = document.getElementById(countElId);
  if (countEl) countEl.textContent = !query ? '' : (marks.length ? `1/${marks.length}` : 'No matches');
  if (marks.length) focusMatch(panelKey);
}

function focusMatch(panelKey) {
  const st = searchState[panelKey];
  if (!st || !st.marks.length || st.idx < 0) return;
  st.marks.forEach(m => m.classList.remove('active'));
  const m = st.marks[st.idx];
  m.classList.add('active');
  m.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function searchNav(panelKey, countElId, dir) {
  const st = searchState[panelKey];
  if (!st || !st.marks.length) return;
  st.idx = (st.idx + dir + st.marks.length) % st.marks.length;
  focusMatch(panelKey);
  const countEl = document.getElementById(countElId);
  if (countEl) countEl.textContent = `${st.idx + 1}/${st.marks.length}`;
}

function resetContentSearches() {
  ['docx', 'txt', 'code'].forEach(key => {
    searchState[key] = { marks: [], idx: -1 };
    const input = document.getElementById(key + '-search-box');
    if (input) input.value = '';
    const countEl = document.getElementById(key + '-search-count');
    if (countEl) countEl.textContent = '';
    clearHighlights(document.getElementById(key + '-content'));
  });
  const xlsxInput = document.getElementById('xlsx-search-box');
  if (xlsxInput) xlsxInput.value = '';
  const xlsxCount = document.getElementById('xlsx-search-count');
  if (xlsxCount) xlsxCount.textContent = '';
  document.querySelectorAll('#xlsx-table td.search-hit-cell').forEach(td => td.classList.remove('search-hit-cell', 'active'));
  searchState.xlsx = { marks: [], idx: -1 };
}

// ── XLSX cell search ──────────────────────────────────────────────────────────
function xlsxSearch(query) {
  const cells = Array.from(document.querySelectorAll('#xlsx-table td:not(.row-header)'));
  cells.forEach(td => td.classList.remove('search-hit-cell', 'active'));
  const countEl = document.getElementById('xlsx-search-count');

  if (!query) {
    if (countEl) countEl.textContent = '';
    searchState.xlsx = { marks: [], idx: -1 };
    return;
  }

  const q = query.toLowerCase();
  const matches = cells.filter(td => td.textContent.toLowerCase().includes(q));
  matches.forEach(td => td.classList.add('search-hit-cell'));
  searchState.xlsx = { marks: matches, idx: matches.length ? 0 : -1 };

  if (countEl) countEl.textContent = matches.length ? `1/${matches.length}` : 'No matches';
  if (matches.length) {
    matches[0].classList.add('active');
    matches[0].scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
  }
}

function xlsxSearchNav(dir) {
  const st = searchState.xlsx;
  if (!st || !st.marks.length) return;
  st.marks[st.idx].classList.remove('active');
  st.idx = (st.idx + dir + st.marks.length) % st.marks.length;
  st.marks[st.idx].classList.add('active');
  st.marks[st.idx].scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
  const countEl = document.getElementById('xlsx-search-count');
  if (countEl) countEl.textContent = `${st.idx + 1}/${st.marks.length}`;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Touch swipe — PDF page navigation ────────────────────────────────────────
(function () {
  const SWIPE_THRESHOLD  = 50;  // min px horizontal travel to count as swipe
  const SWIPE_MAX_VERT   = 80;  // max vertical drift allowed (so scroll still works)
  let touchStartX = 0;
  let touchStartY = 0;
  let tracking    = false;

  const wrap = document.getElementById('pdf-canvas-wrap');

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    tracking    = true;
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;

    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;

    // Ignore if mostly vertical (user is scrolling)
    if (Math.abs(dy) > SWIPE_MAX_VERT) return;
    if (Math.abs(dx) < SWIPE_THRESHOLD) return;

    if (dx < 0) {
      pdfNextPage();   // swipe left  → next page
    } else {
      pdfPrevPage();   // swipe right → prev page
    }
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    if (!tracking) return;
    const dy = e.touches[0].clientY - touchStartY;
    const dx = e.touches[0].clientX - touchStartX;
    // If clearly scrolling vertically, cancel swipe tracking
    if (Math.abs(dy) > Math.abs(dx) + 10) tracking = false;
  }, { passive: true });
})();
</script>
</body>
</html>
